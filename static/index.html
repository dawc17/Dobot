<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Dobot Controller</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      html,
      body {
        height: 100%;
      }
      :root {
        --bg: #16161e;
        --panel: #20202c;
        --deep: #111118;
        --border: #2a2a3e;
        --sep: #232334;
        --text: #d0d0e4;
        --dim: #6060a0;
        --muted: #3e3e5a;
        --accent: #3d7fe8;
        --accent-h: #5491f0;
        --accent-p: #2a5db8;
        --amber: #e89220;
        --amber-h: #f0a834;
        --danger: #cf3545;
        --danger-h: #e04555;
        --success: #1fc46e;
        --success-h: #2ed880;
        --warn: #c89c20;
        --ok: #1fc46e;
        --bad: #cf3545;
        --mono: "Share Tech Mono", "Consolas", monospace;
        --ui: "Rajdhani", "Segoe UI", sans-serif;
      }
      body {
        background: var(--bg);
        color: var(--text);
        font-family: var(--ui);
        font-size: 14px;
        display: flex;
        flex-direction: column;
        height: 100vh;
        overflow: hidden;
      }

      /* ── Header ── */
      header {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 0 16px;
        height: 50px;
        background: var(--deep);
        border-bottom: 1px solid var(--border);
        flex-shrink: 0;
      }
      .brand {
        font-family: var(--ui);
        font-weight: 700;
        font-size: 13px;
        letter-spacing: 3px;
        color: var(--amber);
        text-transform: uppercase;
        margin-right: auto;
      }
      .brand em {
        color: var(--dim);
        font-style: normal;
        font-weight: 500;
      }
      .sdot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: var(--bad);
        flex-shrink: 0;
        transition: background 0.3s;
      }
      .sdot.ok {
        background: var(--ok);
        box-shadow: 0 0 8px var(--ok);
      }
      .sdot.warn {
        background: var(--warn);
        animation: blink 1s infinite;
      }
      @keyframes blink {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.25;
        }
      }
      #status-text {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 1px;
        color: var(--dim);
        margin-right: 4px;
      }
      select {
        background: var(--panel);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 4px 8px;
        font-size: 13px;
        font-family: var(--ui);
        font-weight: 500;
        min-width: 100px;
        outline: none;
      }

      /* ── Buttons ── */
      button {
        background: var(--accent);
        color: #fff;
        border: none;
        border-radius: 3px;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 13px;
        font-family: var(--ui);
        font-weight: 600;
        letter-spacing: 0.4px;
        white-space: nowrap;
        transition: background 0.1s;
      }
      button:hover:not(:disabled) {
        background: var(--accent-h);
      }
      button:active:not(:disabled) {
        background: var(--accent-p);
      }
      button.ghost {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--dim);
      }
      button.ghost:hover:not(:disabled) {
        border-color: var(--dim);
        background: var(--sep);
        color: var(--text);
      }
      button.danger {
        background: var(--danger);
      }
      button.danger:hover:not(:disabled) {
        background: var(--danger-h);
      }
      button.success {
        background: var(--success);
      }
      button.success:hover:not(:disabled) {
        background: var(--success-h);
      }
      button:disabled {
        background: var(--sep) !important;
        color: var(--muted) !important;
        cursor: not-allowed;
      }
      .btn-row {
        display: flex;
        gap: 5px;
        flex-wrap: wrap;
        align-items: center;
        margin-top: 6px;
      }

      /* ── Layout ── */
      #main {
        display: grid;
        grid-template-columns: 360px 258px 1fr;
        gap: 7px;
        padding: 7px;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }
      .col {
        display: flex;
        flex-direction: column;
        gap: 7px;
        overflow-y: auto;
        min-height: 0;
      }
      #col-seq {
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }

      /* ── Panels ── */
      .panel {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 4px;
        padding: 10px 12px;
        flex-shrink: 0;
      }
      #panel-seq {
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 0;
        overflow: hidden;
      }
      .ph {
        font-family: var(--ui);
        font-size: 10px;
        font-weight: 700;
        color: var(--dim);
        text-transform: uppercase;
        letter-spacing: 1.8px;
        padding-bottom: 7px;
        margin-bottom: 9px;
        border-bottom: 1px solid var(--sep);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      /* ── Position ── */
      .pos-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 4px;
      }
      .pos-cell {
        background: var(--deep);
        border-radius: 3px;
        padding: 6px 4px;
        text-align: center;
        border: 1px solid var(--sep);
      }
      .pos-lbl {
        display: block;
        font-size: 9px;
        color: var(--dim);
        letter-spacing: 1.5px;
        font-weight: 700;
        margin-bottom: 2px;
      }
      .pos-val {
        display: block;
        font-family: var(--mono);
        font-size: 17px;
        color: var(--amber);
      }

      /* ── Forms ── */
      .form-row {
        display: grid;
        grid-template-columns: 14px 1fr 14px 1fr;
        align-items: center;
        gap: 4px 8px;
        margin-bottom: 5px;
      }
      .form-row label {
        color: var(--dim);
        font-size: 12px;
        font-weight: 700;
        text-align: right;
      }
      input[type="number"],
      input[type="text"] {
        background: var(--deep);
        color: var(--text);
        border: 1px solid var(--border);
        border-radius: 3px;
        padding: 4px 7px;
        font-size: 13px;
        font-family: var(--mono);
        width: 100%;
        outline: none;
      }
      input[type="number"]:focus,
      input[type="text"]:focus {
        border-color: var(--accent);
      }

      /* ── Step size ── */
      .step-row {
        display: flex;
        align-items: center;
        gap: 4px;
        margin-bottom: 7px;
      }
      .step-lbl {
        color: var(--dim);
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.5px;
      }
      .step-btn {
        background: transparent;
        border: 1px solid var(--border);
        color: var(--dim);
        padding: 3px 10px;
        font-size: 12px;
        font-family: var(--mono);
        border-radius: 3px;
      }
      .step-btn.active {
        background: var(--accent);
        border-color: var(--accent);
        color: #fff;
      }
      .step-btn:hover:not(.active):not(:disabled) {
        border-color: var(--dim);
        background: var(--sep);
      }

      /* ── Jog grid ── */
      .jog-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 4px;
      }
      .jog-grid button {
        font-family: var(--mono);
        font-size: 13px;
        font-weight: 400;
      }

      /* ── Sliders ── */
      .sg {
        margin-bottom: 9px;
      }
      .sg:last-child {
        margin-bottom: 0;
      }
      .sg .lbl {
        display: block;
        font-size: 10px;
        font-weight: 700;
        color: var(--dim);
        letter-spacing: 1px;
        text-transform: uppercase;
        margin-bottom: 5px;
      }
      .srow {
        display: flex;
        align-items: center;
        gap: 8px;
      }
      input[type="range"] {
        flex: 1;
        -webkit-appearance: none;
        height: 5px;
        background: var(--sep);
        border-radius: 3px;
        outline: none;
        cursor: pointer;
      }
      input[type="range"]::-webkit-slider-thumb {
        -webkit-appearance: none;
        width: 15px;
        height: 15px;
        border-radius: 50%;
        background: var(--accent-h);
        cursor: pointer;
        border: 2px solid var(--bg);
      }
      #cv-sl::-webkit-slider-thumb {
        background: var(--amber);
      }
      .sv {
        font-family: var(--mono);
        font-size: 13px;
        min-width: 34px;
        text-align: right;
        color: var(--amber);
      }

      /* ── Color sensor ── */
      .sensor-row {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 18px;
        padding: 8px 0;
      }
      .sensor-item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 5px;
      }
      .sensor-item label {
        font-size: 9px;
        color: var(--muted);
        font-weight: 700;
        letter-spacing: 1.5px;
      }
      .sdot-lg {
        width: 22px;
        height: 22px;
        border-radius: 50%;
        background: var(--deep);
        border: 2px solid var(--muted);
        transition:
          background 0.15s,
          box-shadow 0.15s,
          border-color 0.15s;
      }
      .sdot-lg.r.lit {
        background: #ff3050;
        border-color: #ff3050;
        box-shadow:
          0 0 10px #ff3050,
          0 0 22px rgba(255, 48, 80, 0.3);
      }
      .sdot-lg.g.lit {
        background: #20ef70;
        border-color: #20ef70;
        box-shadow:
          0 0 10px #20ef70,
          0 0 22px rgba(32, 239, 112, 0.3);
      }
      .sdot-lg.b.lit {
        background: #3090ff;
        border-color: #3090ff;
        box-shadow:
          0 0 10px #3090ff,
          0 0 22px rgba(48, 144, 255, 0.3);
      }
      .sdot-lg.ir.lit {
        background: #e890c0;
        border-color: #e890c0;
        box-shadow:
          0 0 10px #e890c0,
          0 0 22px rgba(232, 144, 192, 0.3);
      }
      .sensor-ctl {
        display: flex;
        align-items: center;
        gap: 5px;
        flex-wrap: wrap;
      }
      .sensor-ctl select {
        min-width: 60px;
        font-size: 12px;
        padding: 3px 5px;
      }
      .sensor-ctl button {
        font-size: 11px;
        padding: 3px 8px;
      }

      /* ── Sequence ── */
      .add-btns {
        display: flex;
        flex-wrap: wrap;
        gap: 3px;
        margin-bottom: 7px;
      }
      .add-btns button {
        font-size: 11px;
        padding: 3px 8px;
      }
      #seq-list {
        flex: 1;
        overflow-y: auto;
        min-height: 0;
        border: 1px solid var(--sep);
        border-radius: 3px;
        margin-bottom: 5px;
      }
      .seq-row {
        display: flex;
        align-items: center;
        gap: 7px;
        padding: 4px 9px;
        cursor: pointer;
        min-height: 27px;
        border-bottom: 1px solid var(--sep);
      }
      .seq-row:last-child {
        border-bottom: none;
      }
      .seq-row:hover {
        background: rgba(255, 255, 255, 0.04);
      }
      .seq-row.selected {
        background: rgba(61, 127, 232, 0.15);
      }
      .seq-row.current {
        background: rgba(31, 196, 110, 0.15);
      }
      .seqdot {
        width: 7px;
        height: 7px;
        border-radius: 50%;
        flex-shrink: 0;
      }
      .snum {
        color: var(--muted);
        font-family: var(--mono);
        font-size: 11px;
        min-width: 22px;
      }
      .slbl {
        flex: 1;
        font-size: 12px;
        font-family: var(--mono);
      }
      .seq-empty {
        color: var(--muted);
        font-size: 12px;
        text-align: center;
        padding: 20px;
      }
      #panel-seq .btn-row {
        margin-bottom: 5px;
      }
      #inp-name {
        flex: 1;
        min-width: 70px;
      }

      /* ── Log ── */
      #log-panel {
        flex-shrink: 0;
        height: 155px;
        background: var(--deep);
        border-top: 1px solid var(--border);
        padding: 5px 14px 6px;
        display: flex;
        flex-direction: column;
        overflow: hidden;
      }
      #log-hdr {
        font-size: 10px;
        font-weight: 700;
        color: var(--muted);
        letter-spacing: 2px;
        text-transform: uppercase;
        margin-bottom: 4px;
      }
      #log-entries {
        overflow-y: auto;
        flex: 1;
        font-size: 11px;
        font-family: var(--mono);
      }
      .le {
        display: flex;
        gap: 10px;
        padding: 1px 0;
      }
      .lts {
        color: var(--muted);
        flex-shrink: 0;
      }
      .lmsg {
        color: var(--dim);
      }
      .le.ERROR .lmsg {
        color: #d84848;
      }
      .le.WARNING .lmsg {
        color: var(--warn);
      }

      /* ── Modals ── */
      .modal {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.72);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 100;
      }
      .modal.hidden {
        display: none;
      }
      .mbox {
        background: var(--panel);
        border: 1px solid var(--border);
        border-radius: 6px;
        padding: 18px;
        min-width: 300px;
        max-width: 460px;
        width: 90%;
      }
      .mtitle {
        font-size: 14px;
        font-weight: 700;
        margin-bottom: 14px;
        color: var(--text);
        letter-spacing: 0.5px;
      }
      .frow {
        display: flex;
        align-items: center;
        gap: 8px;
        margin-bottom: 7px;
      }
      .frow label {
        color: var(--dim);
        min-width: 175px;
        font-size: 12px;
        font-weight: 600;
      }
      .frow input {
        flex: 1;
      }
      #load-list {
        max-height: 240px;
        overflow-y: auto;
      }
      .li {
        padding: 8px 10px;
        cursor: pointer;
        border-radius: 3px;
        color: var(--text);
        font-size: 13px;
        font-family: var(--mono);
      }
      .li:hover {
        background: var(--sep);
      }

      /* ── Named positions ── */
      #np-list {
        max-height: 120px;
        overflow-y: auto;
        border: 1px solid var(--sep);
        border-radius: 3px;
        margin-bottom: 6px;
        min-height: 28px;
      }
      .np-row {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 4px 8px;
        cursor: pointer;
        border-bottom: 1px solid var(--sep);
      }
      .np-row:last-child { border-bottom: none; }
      .np-row:hover { background: rgba(255,255,255,0.04); }
      .np-row.selected { background: rgba(61,127,232,0.15); }
      .np-n { flex: 1; font-family: var(--mono); font-size: 12px; }
      .np-c { font-family: var(--mono); font-size: 10px; color: var(--dim); }
      .np-off-row {
        display: grid;
        grid-template-columns: 22px 1fr 22px 1fr 22px 1fr;
        gap: 4px 6px;
        align-items: center;
        margin-bottom: 5px;
      }
      .np-off-row label {
        color: var(--dim);
        font-size: 11px;
        font-weight: 700;
        text-align: right;
      }
      #np-name { min-width: 60px; flex: 1; }

      /* ── Scrollbars ── */
      ::-webkit-scrollbar {
        width: 4px;
        height: 4px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: var(--muted);
        border-radius: 2px;
      }
    </style>
  </head>
  <body>
    <!-- Header -->
    <header>
      <span class="brand">DOBOT <em>CONTROLLER</em></span>
      <span class="sdot" id="dot"></span>
      <span id="status-text">DISCONNECTED</span>
      <select id="port-select">
        <option value="">No ports</option>
      </select>
      <button id="btn-refresh" class="ghost">Refresh</button>
      <button id="btn-connect">Connect</button>
      <button id="btn-home" class="ghost">Home</button>
    </header>

    <!-- Main -->
    <div id="main">
      <!-- Left: Position + Move To + Quick Jog -->
      <div class="col">
        <div class="panel">
          <div class="ph">Position</div>
          <div class="pos-grid">
            <div class="pos-cell">
              <span class="pos-lbl">X</span
              ><span class="pos-val" id="px">0.00</span>
            </div>
            <div class="pos-cell">
              <span class="pos-lbl">Y</span
              ><span class="pos-val" id="py">0.00</span>
            </div>
            <div class="pos-cell">
              <span class="pos-lbl">Z</span
              ><span class="pos-val" id="pz">0.00</span>
            </div>
            <div class="pos-cell">
              <span class="pos-lbl">R</span
              ><span class="pos-val" id="pr">0.00</span>
            </div>
          </div>
        </div>

        <div class="panel">
          <div class="ph">Move To</div>
          <div class="form-row">
            <label>X</label
            ><input type="number" id="ix" value="200" step="0.1" />
            <label>Y</label><input type="number" id="iy" value="0" step="0.1" />
          </div>
          <div class="form-row">
            <label>Z</label
            ><input type="number" id="iz" value="50" step="0.1" />
            <label>R</label><input type="number" id="ir" value="0" step="0.1" />
          </div>
          <div class="btn-row" style="margin-top: 8px">
            <button id="btn-curr" class="ghost">Use Current</button>
            <button id="btn-move">Move To</button>
          </div>
        </div>

        <div class="panel">
          <div class="ph">
            Quick Jog
            <span
              style="font-size: 9px; font-weight: 500; letter-spacing: 0.5px"
              >ARROW KEYS / PGUP / PGDN</span
            >
          </div>
          <div class="step-row">
            <span class="step-lbl">STEP:</span>
            <button class="step-btn" data-step="5">5</button>
            <button class="step-btn" data-step="10">10</button>
            <button class="step-btn active" data-step="20">20</button>
            <button class="step-btn" data-step="50">50</button>
            <span class="step-lbl" style="margin-left: 2px">mm</span>
          </div>
          <div class="jog-grid">
            <button data-axis="x" data-sign="-1">X &minus;</button>
            <button data-axis="x" data-sign="1">X +</button>
            <button data-axis="y" data-sign="-1">Y &minus;</button>
            <button data-axis="y" data-sign="1">Y +</button>
            <button data-axis="z" data-sign="-1">Z &minus;</button>
            <button data-axis="z" data-sign="1">Z +</button>
          </div>
        </div>
        <div class="panel">
          <div class="ph">Named Positions</div>
          <div id="np-list"><div style="color:var(--muted);font-size:11px;padding:8px;text-align:center">No saved positions</div></div>
          <div class="np-off-row">
            <label>dX</label><input type="number" id="np-dx" value="0" step="0.1">
            <label>dY</label><input type="number" id="np-dy" value="0" step="0.1">
            <label>dZ</label><input type="number" id="np-dz" value="0" step="0.1">
          </div>
          <div class="btn-row">
            <input type="text" id="np-name" placeholder="position name">
            <button id="btn-np-save" class="ghost">Save</button>
            <button id="btn-np-del" class="danger" style="display:none">Del</button>
            <button id="btn-np-go">Go</button>
          </div>
        </div>
      </div>

      <!-- Center: Z/Speed + Vacuum + Conveyor + Color Sensor -->
      <div class="col">
        <div class="panel">
          <div class="ph">Z Jog &amp; Speed</div>
          <div class="sg">
            <span class="lbl">Z Velocity</span>
            <div class="srow">
              <input type="range" id="z-sl" min="-100" max="100" value="0" />
              <span class="sv" id="z-sv">0</span>
            </div>
          </div>
          <div class="sg">
            <span class="lbl">Speed (mm/s)</span>
            <div class="srow">
              <input type="range" id="sp-sl" min="5" max="200" value="50" />
              <span class="sv" id="sp-sv">50</span>
            </div>
          </div>
          <div class="btn-row">
            <button id="btn-vac">Vacuum OFF</button>
            <button id="btn-alm" class="danger">Clear Alarms</button>
          </div>
        </div>

        <div class="panel">
          <div class="ph">Conveyor Belt</div>
          <div class="sg">
            <span class="lbl">Speed (%)</span>
            <div class="srow">
              <input type="range" id="cv-sl" min="0" max="100" value="50" />
              <span class="sv" id="cv-sv">50</span>
            </div>
          </div>
          <div class="btn-row">
            <button id="btn-cdir" class="ghost">Forward</button>
            <button id="btn-crun" class="success">Start</button>
            <button id="btn-ciface" class="ghost">Iface: 0</button>
          </div>
        </div>

        <div class="panel">
          <div class="ph">Color Sensor</div>
          <div class="sensor-row">
            <div class="sensor-item">
              <div class="sdot-lg r" id="dot-r"></div>
              <label>RED</label>
            </div>
            <div class="sensor-item">
              <div class="sdot-lg g" id="dot-g"></div>
              <label>GRN</label>
            </div>
            <div class="sensor-item">
              <div class="sdot-lg b" id="dot-b"></div>
              <label>BLU</label>
            </div>
            <div class="sensor-item">
              <div class="sdot-lg ir" id="dot-ir"></div>
              <label>IR</label>
            </div>
          </div>
          <div class="sensor-ctl">
            <select id="color-port" title="Color sensor port">
              <option value="GP1">GP1</option>
              <option value="GP2" selected>GP2</option>
              <option value="GP4">GP4</option>
              <option value="GP5">GP5</option>
            </select>
            <select id="ir-port" title="IR sensor port">
              <option value="GP1">GP1</option>
              <option value="GP2">GP2</option>
              <option value="GP4" selected>GP4</option>
              <option value="GP5">GP5</option>
            </select>
            <button id="btn-read-sensor" class="ghost">Read</button>
            <button id="btn-autopoll" class="ghost">Auto: OFF</button>
          </div>
        </div>
      </div>

      <!-- Right: Sequence Editor -->
      <div id="col-seq">
        <div class="panel" id="panel-seq">
          <div class="ph">
            <span>Sequence Editor</span>
            <span
              id="seq-cnt"
              style="
                color: var(--muted);
                font-size: 11px;
                font-family: var(--mono);
              "
            ></span>
          </div>
          <div class="add-btns">
            <button class="ghost add" data-type="move_to">+ Pos</button>
            <button class="ghost add" data-type="move_rel">+ Rel</button>
            <button class="ghost add" data-type="suction">+ Suction</button>
            <button class="ghost add" data-type="gripper">+ Gripper</button>
            <button class="ghost add" data-type="wait">+ Wait</button>
            <button class="ghost add" data-type="home">+ Home</button>
            <button class="ghost add" data-type="speed">+ Speed</button>
            <button class="ghost add" data-type="set_io">+ IO</button>
            <button class="ghost add" data-type="conveyor_belt">+ Conv</button>
            <button class="ghost add" data-type="conveyor_belt_distance">
              + Conv Dist
            </button>
            <button class="ghost add" data-type="color_branch">
              + Color Branch
            </button>
            <button class="ghost add" data-type="wait_for_color">
              + Wait Color
            </button>
            <button class="ghost add" data-type="move_to_named">+ Named</button>
          </div>
          <div id="seq-list"></div>
          <div class="btn-row">
            <button id="btn-del" class="danger">Delete</button>
            <button id="btn-up" class="ghost">Up</button>
            <button id="btn-dn" class="ghost">Down</button>
            <button id="btn-dup" class="ghost">Dup</button>
          </div>
          <div class="btn-row">
            <button id="btn-play" class="success">Play</button>
            <button id="btn-stop" class="danger">Stop</button>
            <button id="btn-loop" class="ghost">Loop: OFF</button>
          </div>
          <div class="btn-row">
            <button id="btn-save" class="ghost">Save</button>
            <button id="btn-load" class="ghost">Load</button>
            <button id="btn-clr" class="danger">Clear</button>
            <input type="text" id="inp-name" value="untitled" />
          </div>
        </div>
      </div>
    </div>

    <!-- Log -->
    <div id="log-panel">
      <div id="log-hdr">LOG</div>
      <div id="log-entries"></div>
    </div>

    <!-- Edit modal -->
    <div id="edit-modal" class="modal hidden">
      <div class="mbox">
        <div class="mtitle" id="m-title">Edit Step</div>
        <div id="m-fields"></div>
        <div class="btn-row" style="margin-top: 14px">
          <button id="m-apply">Apply</button>
          <button id="m-cancel" class="ghost">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Load picker -->
    <div id="load-modal" class="modal hidden">
      <div class="mbox">
        <div class="mtitle">Load Sequence</div>
        <div id="load-list"></div>
        <div class="btn-row" style="margin-top: 10px">
          <button id="lm-cancel" class="ghost">Cancel</button>
        </div>
      </div>
    </div>

    <script>
      // ── State ─────────────────────────────────────────────────────────────────────
      const S = {
        connected: false,
        connecting: false,
        ports: [],
        portIndex: 0,
        pos: { X: 0, Y: 0, Z: 0, R: 0 },
        vacuum: false,
        convRunning: false,
        convDir: 1,
        convIface: 0,
        playing: false,
        paused: false,
        looping: false,
        current: -1,
        steps: [],
        selected: -1,
        jogStep: 20,
        positions: {},
        selectedPos: null,
      };

      const $ = (id) => document.getElementById(id);
      const esc = (s) =>
        String(s)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");

      // ── API ───────────────────────────────────────────────────────────────────────
      async function post(url, data) {
        const r = await fetch(url, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data ?? {}),
        });
        if (r.status === 204) return null;
        return r.json();
      }
      async function del(url) {
        return (await fetch(url, { method: "DELETE" })).json();
      }
      async function put(url, data) {
        return (
          await fetch(url, {
            method: "PUT",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data),
          })
        ).json();
      }

      // ── SSE ───────────────────────────────────────────────────────────────────────
      function startSse() {
        const es = new EventSource("/events");
        es.onmessage = (e) => handle(JSON.parse(e.data));
        es.onerror = () => setStatus(false, false);
      }

      function handle(d) {
        switch (d.type) {
          case "state":
            applyState(d);
            break;
          case "pos":
            applyPos(d);
            break;
          case "log":
            addLog(d);
            break;
          case "steps":
            renderSteps(d.steps);
            break;
          case "seq_state":
            applySeqState(d);
            break;
          case "vacuum":
            setVacuum(d.on);
            break;
          case "conveyor":
            applyConveyor(d);
            break;
          case "ports":
            setPorts(d.ports, d.index);
            break;
          case "positions":
            applyPositions(d.positions);
            break;
        }
      }

      function applyState(d) {
        S.connected = d.connected;
        S.connecting = d.connecting;
        S.convRunning = d.conv_running;
        S.convDir = d.conv_direction;
        S.convIface = d.conv_interface;
        S.playing = d.seq_playing;
        S.paused = d.seq_paused;
        S.looping = d.seq_looping;
        S.current = d.seq_current;
        S.steps = d.steps ?? [];
        setPorts(d.ports, d.port_index);
        applyPos(d.pos);
        setStatus(d.connected, d.connecting);
        setVacuum(d.vacuum);
        updateConvBtns();
        renderSteps(S.steps);
        applySeqState(d);
        if (d.logs) d.logs.forEach(addLog);
        applyPositions(d.positions || {});
      }

      function applyPos(p) {
        if (!p) return;
        if (p.X !== undefined) S.pos = { X: p.X, Y: p.Y, Z: p.Z, R: p.R };
        $("px").textContent = S.pos.X.toFixed(2);
        $("py").textContent = S.pos.Y.toFixed(2);
        $("pz").textContent = S.pos.Z.toFixed(2);
        $("pr").textContent = S.pos.R.toFixed(2);
      }

      function setStatus(conn, busy) {
        const dot = $("dot"),
          txt = $("status-text"),
          btn = $("btn-connect");
        if (busy) {
          dot.className = "sdot warn";
          txt.textContent = "CONNECTING";
          btn.textContent = "Connecting…";
          btn.disabled = true;
        } else if (conn) {
          dot.className = "sdot ok";
          txt.textContent = "CONNECTED";
          btn.textContent = "Disconnect";
          btn.className = "danger";
          btn.disabled = false;
        } else {
          dot.className = "sdot";
          txt.textContent = "DISCONNECTED";
          btn.textContent = "Connect";
          btn.className = "";
          btn.disabled = false;
        }
      }

      function setPorts(ports, idx) {
        S.ports = ports ?? [];
        S.portIndex = idx ?? 0;
        const sel = $("port-select");
        sel.innerHTML = S.ports.length
          ? S.ports
              .map(
                (p, i) =>
                  `<option value="${i}"${i === S.portIndex ? " selected" : ""}>${p}</option>`,
              )
              .join("")
          : '<option value="">No ports</option>';
      }

      function setVacuum(on) {
        S.vacuum = on;
        const b = $("btn-vac");
        b.textContent = on ? "Vacuum ON" : "Vacuum OFF";
        b.className = on ? "success" : "";
      }

      function applyConveyor(d) {
        S.convRunning = d.running;
        S.convDir = d.direction;
        S.convIface = d.interface;
        updateConvBtns();
      }
      function updateConvBtns() {
        $("btn-crun").textContent = S.convRunning ? "Stop" : "Start";
        $("btn-crun").className = S.convRunning ? "danger" : "success";
        $("btn-cdir").textContent = S.convDir > 0 ? "Forward" : "Reverse";
        $("btn-ciface").textContent = `Iface: ${S.convIface}`;
      }

      function applySeqState(d) {
        S.playing = d.seq_playing ?? d.playing ?? S.playing;
        S.paused = d.seq_paused ?? d.paused ?? S.paused;
        S.looping = d.seq_looping ?? d.looping ?? S.looping;
        S.current = d.seq_current ?? d.current ?? S.current;
        const p = $("btn-play");
        if (S.playing && !S.paused) {
          p.textContent = "Pause";
          p.className = "";
        } else if (S.playing && S.paused) {
          p.textContent = "Resume";
          p.className = "success";
        } else {
          p.textContent = "Play";
          p.className = "success";
        }
        $("btn-loop").textContent = `Loop: ${S.looping ? "ON" : "OFF"}`;
        $("btn-loop").className = S.looping ? "success" : "ghost";
        renderSteps(null);
      }

      // ── Log ───────────────────────────────────────────────────────────────────────
      function addLog(e) {
        const el = $("log-entries");
        const row = document.createElement("div");
        row.className = `le ${e.level}`;
        row.innerHTML = `<span class="lts">${e.ts}</span><span class="lmsg">${esc(e.msg)}</span>`;
        el.appendChild(row);
        while (el.children.length > 300) el.removeChild(el.firstChild);
        el.scrollTop = el.scrollHeight;
      }

      // ── Named positions ───────────────────────────────────────────────────────
      function applyPositions(positions) {
        S.positions = positions || {};
        if (S.selectedPos && !(S.selectedPos in S.positions)) S.selectedPos = null;
        renderPositions();
      }

      function renderPositions() {
        const list = $("np-list");
        const names = Object.keys(S.positions);
        $("btn-np-del").style.display = S.selectedPos ? "" : "none";
        if (!names.length) {
          list.innerHTML = '<div style="color:var(--muted);font-size:11px;padding:8px;text-align:center">No saved positions</div>';
          return;
        }
        list.innerHTML = names.map(n => {
          const p = S.positions[n];
          const sel = n === S.selectedPos;
          return `<div class="np-row${sel ? " selected" : ""}" data-name="${esc(n)}">
            <span class="np-n">${esc(n)}</span>
            <span class="np-c">${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}</span>
          </div>`;
        }).join("");
        list.querySelectorAll(".np-row").forEach(row => {
          row.addEventListener("click", () => {
            const n = row.dataset.name;
            S.selectedPos = (S.selectedPos === n) ? null : n;
            if (S.selectedPos) $("np-name").value = S.selectedPos;
            renderPositions();
          });
        });
      }

      // ── Step list ─────────────────────────────────────────────────────────────────
      const COLORS = {
        move_to: "#3d7fe8",
        move_rel: "#5a9af0",
        suction: "#1fc46e",
        gripper: "#28d47e",
        wait: "#c89c20",
        home: "#6060a0",
        speed: "#4a85c8",
        set_io: "#c83848",
        conveyor_belt: "#c87820",
        conveyor_belt_distance: "#d06020",
        color_branch: "#b040c0",
        wait_for_color: "#9030a8",
        move_to_named: "#38b2d0",
      };

      function slabel(s) {
        const t = s.type,
          p = s.params;
        if (t === "move_to")
          return `Move To (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}, ${p.r.toFixed(1)})`;
        if (t === "move_rel")
          return `Move Rel (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}, ${p.r.toFixed(1)})`;
        if (t === "suction") return `Suction ${p.on ? "ON" : "OFF"}`;
        if (t === "gripper") return `Gripper ${p.on ? "ON" : "OFF"}`;
        if (t === "wait") return `Wait ${p.seconds.toFixed(1)}s`;
        if (t === "home") return "Home";
        if (t === "speed") return `Speed ${p.velocity.toFixed(0)} mm/s`;
        if (t === "set_io") return `IO #${p.address} ${p.state ? "ON" : "OFF"}`;
        if (t === "conveyor_belt") {
          const d = p.direction > 0 ? "FWD" : "REV";
          const dur = p.duration > 0 ? ` ${p.duration.toFixed(1)}s` : " cont.";
          return `Belt ${Math.round(p.speed * 100)}% ${d}${dur}`;
        }
        if (t === "conveyor_belt_distance") {
          const d = p.direction > 0 ? "FWD" : "REV";
          return `Belt ${p.distance.toFixed(0)}mm@${p.speed.toFixed(0)}mm/s ${d}`;
        }
        if (t === "color_branch") {
          const parts = [];
          if (p.on_red > 0) parts.push(`R→${p.on_red}`);
          if (p.on_green > 0) parts.push(`G→${p.on_green}`);
          if (p.on_blue > 0) parts.push(`B→${p.on_blue}`);
          return `Color Branch ${parts.length ? parts.join(", ") : "(no branches set)"}`;
        }
        if (t === "move_to_named") {
          const offs = [["X","dx"],["Y","dy"],["Z","dz"],["R","dr"]]
            .filter(([,k]) => p[k]).map(([a,k]) => `d${a}${p[k]>0?"+":""}${p[k].toFixed(1)}`);
          return `→ '${p.name || "?"}'${offs.length ? " " + offs.join(" ") : ""}`;
        }
        if (t === "wait_for_color") {
          const colors = [
            p.wait_r ? "R" : null,
            p.wait_g ? "G" : null,
            p.wait_b ? "B" : null,
          ].filter(Boolean);
          const to = p.timeout > 0 ? ` ${p.timeout.toFixed(0)}s` : " ∞";
          return `Wait Color ${colors.join("|") || "?"}${to}`;
        }
        return t;
      }

      function renderSteps(steps) {
        if (steps != null) S.steps = steps;
        $("seq-cnt").textContent = `${S.steps.length} steps`;
        const list = $("seq-list");
        if (!S.steps.length) {
          list.innerHTML =
            '<div class="seq-empty">Use + buttons above to add steps</div>';
          return;
        }
        list.innerHTML = S.steps
          .map((s, i) => {
            const col = COLORS[s.type] || "#888";
            const cls =
              i === S.current ? "current" : i === S.selected ? "selected" : "";
            return `<div class="seq-row ${cls}" data-i="${i}">
      <span class="snum">${String(i + 1).padStart(2, "0")}</span>
      <span class="seqdot" style="background:${col}"></span>
      <span class="slbl">${esc(slabel(s))}</span>
    </div>`;
          })
          .join("");
        list.querySelectorAll(".seq-row").forEach((row) => {
          const idx = parseInt(row.dataset.i);
          row.addEventListener("click", () => {
            if (idx === S.selected) openEdit(idx);
            else {
              S.selected = idx;
              renderSteps(null);
            }
          });
          row.addEventListener("dblclick", () => openEdit(idx));
        });
      }

      // ── Step defaults ─────────────────────────────────────────────────────────────
      function defStep(type) {
        const pos = S.pos;
        const map = {
          move_to: { x: pos.X, y: pos.Y, z: pos.Z, r: pos.R },
          move_rel: { x: 0, y: 0, z: 0, r: 0 },
          suction: { on: true },
          gripper: { on: true },
          wait: { seconds: 1.0 },
          home: {},
          speed: { velocity: 100, acceleration: 100 },
          set_io: { address: 1, state: true },
          conveyor_belt: {
            speed: 0.5,
            direction: S.convDir,
            interface: S.convIface,
            duration: 2.0,
          },
          conveyor_belt_distance: {
            speed: 50,
            distance: 100,
            direction: S.convDir,
            interface: S.convIface,
          },
          color_branch: {
            port: 1,
            on_red: 0,
            on_green: 0,
            on_blue: 0,
            on_none: 0,
          },
          wait_for_color: {
            port: 1,
            wait_r: 1,
            wait_g: 0,
            wait_b: 0,
            timeout: 10,
          },
          move_to_named: {
            name: S.selectedPos || "",
            dx: 0,
            dy: 0,
            dz: 0,
            dr: 0,
          },
        };
        const params = map[type] ?? {};
        if (type === "suction" || type === "gripper") {
          for (let i = S.steps.length - 1; i >= 0; i--) {
            if (S.steps[i].type === type) {
              params.on = !S.steps[i].params.on;
              break;
            }
          }
        }
        return { type, params };
      }

      async function addStep(type) {
        const step = defStep(type);
        const idx = S.selected >= 0 ? S.selected + 1 : S.steps.length;
        await post("/api/sequence/insert", { idx, step });
        S.selected = idx;
      }

      // ── Edit modal ────────────────────────────────────────────────────────────────
      const FIELDS = {
        move_to: [
          { k: "x", l: "X" },
          { k: "y", l: "Y" },
          { k: "z", l: "Z" },
          { k: "r", l: "R" },
        ],
        move_rel: [
          { k: "x", l: "X" },
          { k: "y", l: "Y" },
          { k: "z", l: "Z" },
          { k: "r", l: "R" },
        ],
        suction: [{ k: "on", l: "ON (1=on, 0=off)" }],
        gripper: [{ k: "on", l: "ON (1=on, 0=off)" }],
        wait: [{ k: "seconds", l: "Seconds" }],
        home: [],
        speed: [
          { k: "velocity", l: "Velocity (mm/s)" },
          { k: "acceleration", l: "Accel (mm/s²)" },
        ],
        set_io: [
          { k: "address", l: "Pin (1–22)" },
          { k: "state", l: "State (1=on, 0=off)" },
        ],
        conveyor_belt: [
          { k: "speed", l: "Speed (0.0–1.0)" },
          { k: "direction", l: "Direction (1=fwd, −1=rev)" },
          { k: "interface", l: "Interface (0 or 1)" },
          { k: "duration", l: "Duration sec (0=continuous)" },
        ],
        conveyor_belt_distance: [
          { k: "speed", l: "Speed (mm/s, 0–100)" },
          { k: "distance", l: "Distance (mm)" },
          { k: "direction", l: "Direction (1=fwd, −1=rev)" },
          { k: "interface", l: "Interface (0 or 1)" },
        ],
        color_branch: [
          { k: "port", l: "Sensor port (0=GP1 1=GP2 2=GP4 3=GP5)" },
          { k: "on_red", l: "Red detected → go to step# (0=continue)" },
          { k: "on_green", l: "Green detected → go to step# (0=continue)" },
          { k: "on_blue", l: "Blue detected → go to step# (0=continue)" },
          { k: "on_none", l: "Nothing detected → go to step# (0=continue)" },
        ],
        wait_for_color: [
          { k: "port", l: "Sensor port (0=GP1 1=GP2 2=GP4 3=GP5)" },
          { k: "wait_r", l: "Wait for Red (1=yes 0=no)" },
          { k: "wait_g", l: "Wait for Green (1=yes 0=no)" },
          { k: "wait_b", l: "Wait for Blue (1=yes 0=no)" },
          { k: "timeout", l: "Timeout seconds (0=infinite)" },
        ],
        move_to_named: [
          { k: "name", l: "Position name", type: "text" },
          { k: "dx", l: "dX offset (mm)" },
          { k: "dy", l: "dY offset (mm)" },
          { k: "dz", l: "dZ offset (mm)" },
          { k: "dr", l: "dR offset (°)" },
        ],
      };
      let editIdx = -1;

      function openEdit(idx) {
        if (S.playing) return;
        editIdx = idx;
        const s = S.steps[idx];
        $("m-title").textContent = `Edit: ${s.type}`;
        const flds = FIELDS[s.type] ?? [];
        if (!flds.length) {
          $("m-fields").innerHTML =
            '<p style="color:var(--dim);font-size:12px;padding:4px 0">No editable parameters.</p>';
        } else {
          $("m-fields").innerHTML = flds
            .map((f) => {
              const v = s.params[f.k];
              const isText = f.type === "text";
              const dv = isText ? (v ?? "") : (typeof v === "boolean" ? (v ? 1 : 0) : v);
              const attrs = isText ? "" : 'type="number" step="any"';
              return `<div class="frow"><label>${f.l}</label>
        <input ${attrs}${isText ? 'type="text"' : ""} data-k="${f.k}" value="${esc(String(dv))}"></div>`;
            })
            .join("");
        }
        $("edit-modal").classList.remove("hidden");
        const first = $("m-fields").querySelector("input");
        if (first) setTimeout(() => first.focus(), 50);
      }

      async function applyEdit() {
        if (editIdx < 0 || editIdx >= S.steps.length) {
          closeEdit();
          return;
        }
        const step = JSON.parse(JSON.stringify(S.steps[editIdx]));
        document.querySelectorAll("#m-fields input").forEach((inp) => {
          const k = inp.dataset.k,
            cur = step.params[k],
            v = inp.value;
          if (inp.type === "text") step.params[k] = v;
          else if (typeof cur === "boolean")
            step.params[k] = v !== "0" && v.toLowerCase() !== "false";
          else if (typeof cur === "number" && Number.isInteger(cur))
            step.params[k] = Math.round(parseFloat(v));
          else step.params[k] = parseFloat(v);
        });
        await put(`/api/sequence/${editIdx}`, step);
        closeEdit();
      }
      function closeEdit() {
        editIdx = -1;
        $("edit-modal").classList.add("hidden");
      }

      // ── Load picker ───────────────────────────────────────────────────────────────
      async function openLoad() {
        const { files } = await (await fetch("/api/sequence/files")).json();
        const list = $("load-list");
        if (!files.length) {
          list.innerHTML =
            '<div style="color:var(--muted);padding:12px;font-size:12px">No saved sequences</div>';
        } else {
          list.innerHTML = files
            .map(
              (f) =>
                `<div class="li" data-f="${f}">${f.replace(".json", "")}</div>`,
            )
            .join("");
          list.querySelectorAll(".li").forEach((el) => {
            el.addEventListener("click", async () => {
              const r = await post("/api/sequence/load", {
                filename: el.dataset.f,
              });
              if (r.name) $("inp-name").value = r.name;
              $("load-modal").classList.add("hidden");
            });
          });
        }
        $("load-modal").classList.remove("hidden");
      }

      // ── Color sensor ──────────────────────────────────────────────────────────────
      let autoPoll = false,
        pollTimer = null;

      function setColorDots(r, g, b) {
        $("dot-r").classList.toggle("lit", !!r);
        $("dot-g").classList.toggle("lit", !!g);
        $("dot-b").classList.toggle("lit", !!b);
      }
      function setIrDot(det) {
        $("dot-ir").classList.toggle("lit", !!det);
      }

      async function readSensors() {
        if (!S.connected) return;
        try {
          const d = await post("/api/color_sensor", {
            port: $("color-port").value,
          });
          if (d && !d.error) setColorDots(d.r, d.g, d.b);
          const di = await post("/api/ir_sensor", { port: $("ir-port").value });
          if (di && !di.error) setIrDot(di.detected);
        } catch (_) {}
      }

      function toggleAutoPoll() {
        autoPoll = !autoPoll;
        $("btn-autopoll").textContent = `Auto: ${autoPoll ? "ON" : "OFF"}`;
        $("btn-autopoll").className = autoPoll ? "success" : "ghost";
        if (autoPoll) {
          readSensors();
          pollTimer = setInterval(readSensors, 500);
        } else {
          clearInterval(pollTimer);
          pollTimer = null;
        }
      }

      // ── Keyboard jog ──────────────────────────────────────────────────────────────
      const keys = new Set();
      let kbVx = 0,
        kbVy = 0;
      const KSTEP = 0.06;
      const noInput = () =>
        !["INPUT", "TEXTAREA", "SELECT"].includes(
          document.activeElement?.tagName,
        );

      document.addEventListener("keydown", (e) => {
        if (
          noInput() &&
          [
            "ArrowRight",
            "ArrowLeft",
            "ArrowUp",
            "ArrowDown",
            "PageUp",
            "PageDown",
          ].includes(e.code)
        )
          e.preventDefault();
        keys.add(e.code);
      });
      document.addEventListener("keyup", (e) => keys.delete(e.code));

      setInterval(() => {
        if (!noInput()) {
          kbVx = 0;
          kbVy = 0;
          return;
        }
        kbVx = keys.has("ArrowRight")
          ? Math.min(1, kbVx + KSTEP)
          : keys.has("ArrowLeft")
            ? Math.max(-1, kbVx - KSTEP)
            : 0;
        kbVy = keys.has("ArrowDown")
          ? Math.min(1, kbVy + KSTEP)
          : keys.has("ArrowUp")
            ? Math.max(-1, kbVy - KSTEP)
            : 0;
        const zsl = $("z-sl");
        if (keys.has("PageUp")) {
          zsl.value = Math.min(100, +zsl.value + 4);
          $("z-sv").textContent = zsl.value;
        }
        if (keys.has("PageDown")) {
          zsl.value = Math.max(-100, +zsl.value - 4);
          $("z-sv").textContent = zsl.value;
        }
      }, 16);

      // ── Jog loop at 30 fps ────────────────────────────────────────────────────────
      let jogBusy = false,
        lastJogAllZero = true;

      setInterval(() => {
        if (!S.connected || jogBusy) return;
        const vx = kbVx,
          vy = kbVy;
        const vz = parseFloat($("z-sl").value) / 100;
        const speed = parseFloat($("sp-sl").value);
        const allZero = vx === 0 && vy === 0 && vz === 0;
        if (allZero && lastJogAllZero) return;
        lastJogAllZero = allZero;
        jogBusy = true;
        fetch("/api/jog", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ vx, vy, vz, speed }),
        })
          .then(() => {
            jogBusy = false;
          })
          .catch(() => {
            jogBusy = false;
          });
      }, 33);

      // ── Init ──────────────────────────────────────────────────────────────────────
      document.addEventListener("DOMContentLoaded", () => {
        startSse();

        $("btn-refresh").onclick = () => post("/api/refresh");
        $("btn-connect").onclick = () => {
          if (S.connected) post("/api/disconnect");
          else {
            const idx = parseInt($("port-select").value) || 0;
            post("/api/connect", { port: S.ports[idx] || null });
          }
        };
        $("btn-home").onclick = () => post("/api/home");

        $("btn-curr").onclick = () => {
          $("ix").value = S.pos.X.toFixed(2);
          $("iy").value = S.pos.Y.toFixed(2);
          $("iz").value = S.pos.Z.toFixed(2);
          $("ir").value = S.pos.R.toFixed(2);
        };
        $("btn-move").onclick = () =>
          post("/api/move_to", {
            x: parseFloat($("ix").value),
            y: parseFloat($("iy").value),
            z: parseFloat($("iz").value),
            r: parseFloat($("ir").value),
          });

        document.querySelectorAll(".step-btn").forEach((b) => {
          b.onclick = () => {
            S.jogStep = parseFloat(b.dataset.step);
            document
              .querySelectorAll(".step-btn")
              .forEach((x) => x.classList.toggle("active", x === b));
          };
        });

        document.querySelectorAll("[data-axis]").forEach((b) => {
          b.onclick = () =>
            post("/api/jog_step", {
              axis: b.dataset.axis,
              sign: +b.dataset.sign,
              step: S.jogStep,
            });
        });

        $("z-sl").oninput = () => ($("z-sv").textContent = $("z-sl").value);
        $("z-sl").onmouseup = $("z-sl").ontouchend = () => {
          $("z-sl").value = 0;
          $("z-sv").textContent = "0";
          lastJogAllZero = false; // force one final stop send
        };

        $("sp-sl").oninput = () => ($("sp-sv").textContent = $("sp-sl").value);

        $("btn-vac").onclick = () => post("/api/vacuum", { on: !S.vacuum });
        $("btn-alm").onclick = () => post("/api/clear_alarms");

        $("cv-sl").oninput = () => ($("cv-sv").textContent = $("cv-sl").value);
        $("btn-cdir").onclick = () => {
          S.convDir = -S.convDir;
          $("btn-cdir").textContent = S.convDir > 0 ? "Forward" : "Reverse";
          if (S.convRunning) sendConv();
        };
        $("btn-crun").onclick = () => {
          if (S.convRunning)
            post("/api/conveyor", {
              speed: 0,
              direction: S.convDir,
              interface: S.convIface,
            });
          else sendConv();
        };
        $("btn-ciface").onclick = () => {
          S.convIface = 1 - S.convIface;
          $("btn-ciface").textContent = `Iface: ${S.convIface}`;
        };
        function sendConv() {
          post("/api/conveyor", {
            speed: parseInt($("cv-sl").value) / 100,
            direction: S.convDir,
            interface: S.convIface,
          });
        }

        // Named positions
        $("btn-np-save").onclick = () => {
          const name = $("np-name").value.trim();
          if (!name) return;
          post("/api/positions", { name });
          S.selectedPos = name;
        };
        $("btn-np-del").onclick = () => {
          if (!S.selectedPos) return;
          fetch(`/api/positions/${encodeURIComponent(S.selectedPos)}`, { method: "DELETE" });
          S.selectedPos = null;
          $("np-name").value = "";
        };
        $("btn-np-go").onclick = () => {
          if (!S.selectedPos) return;
          post(`/api/positions/${encodeURIComponent(S.selectedPos)}/go`, {
            dx: parseFloat($("np-dx").value) || 0,
            dy: parseFloat($("np-dy").value) || 0,
            dz: parseFloat($("np-dz").value) || 0,
            dr: 0,
          });
        };

        $("btn-read-sensor").onclick = readSensors;
        $("btn-autopoll").onclick = toggleAutoPoll;

        document
          .querySelectorAll(".add")
          .forEach((b) => (b.onclick = () => addStep(b.dataset.type)));

        $("btn-del").onclick = () => {
          if (S.selected < 0) return;
          del(`/api/sequence/${S.selected}`);
          S.selected = Math.max(-1, S.selected - 1);
        };
        $("btn-up").onclick = () => {
          if (S.selected > 0) {
            post("/api/sequence/move", { idx: S.selected, delta: -1 });
            S.selected--;
          }
        };
        $("btn-dn").onclick = () => {
          if (S.selected < S.steps.length - 1) {
            post("/api/sequence/move", { idx: S.selected, delta: 1 });
            S.selected++;
          }
        };
        $("btn-dup").onclick = () => {
          if (S.selected >= 0) {
            post(`/api/sequence/${S.selected}/dup`);
            S.selected++;
          }
        };

        $("btn-play").onclick = () =>
          post(S.playing ? "/api/sequence/pause" : "/api/sequence/play");
        $("btn-stop").onclick = () => post("/api/sequence/stop");
        $("btn-loop").onclick = async () => {
          const r = await post("/api/sequence/loop");
          S.looping = r.looping;
          $("btn-loop").textContent = `Loop: ${S.looping ? "ON" : "OFF"}`;
          $("btn-loop").className = S.looping ? "success" : "ghost";
        };

        $("btn-save").onclick = () =>
          post("/api/sequence/save", {
            name: $("inp-name").value.trim() || "untitled",
          });
        $("btn-load").onclick = openLoad;
        $("btn-clr").onclick = () => {
          post("/api/sequence/clear");
          S.selected = -1;
        };

        $("m-apply").onclick = applyEdit;
        $("m-cancel").onclick = closeEdit;
        $("edit-modal").onclick = (e) => {
          if (e.target === $("edit-modal")) closeEdit();
        };
        $("edit-modal").addEventListener("keydown", (e) => {
          if (e.key === "Enter") applyEdit();
          if (e.key === "Escape") closeEdit();
        });

        $("lm-cancel").onclick = () => $("load-modal").classList.add("hidden");
        $("load-modal").onclick = (e) => {
          if (e.target === $("load-modal"))
            $("load-modal").classList.add("hidden");
        };
      });
    </script>
  </body>
</html>
