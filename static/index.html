<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Dobot Controller</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%}
:root{
  --bg:#16161e;--panel:#20202c;--dark:#1a1a24;--border:#343446;--sep:#303042;
  --text:#e1e1eb;--dim:#8c8c9e;--muted:#525264;
  --accent:#417dc3;--accent-h:#5591d7;--accent-p:#305fa8;
  --danger:#af3a3a;--danger-h:#c64b4b;
  --success:#30ac5f;--success-h:#41c070;
  --warn:#cd9e34;--ok:#30c362;--bad:#c34444;
}
body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;
  font-size:13px;display:flex;flex-direction:column;height:100vh;overflow:hidden}

/* ── Header ── */
header{display:flex;align-items:center;gap:10px;padding:0 14px;height:56px;
  background:var(--bg);border-bottom:1px solid var(--border);flex-shrink:0}
.title{font-size:15px;font-weight:700;letter-spacing:1.5px;margin-right:auto}
.dot{width:9px;height:9px;border-radius:50%;background:var(--bad);flex-shrink:0}
.dot.ok{background:var(--ok)}
.dot.warn{background:var(--warn);animation:blink 1s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.35}}
#status-text{font-size:11px;color:var(--dim);margin-right:8px}
#port-select{background:var(--dark);color:var(--text);border:1px solid var(--border);
  border-radius:4px;padding:4px 8px;font-size:13px;min-width:110px;outline:none}

/* ── Buttons ── */
button{background:var(--accent);color:var(--text);border:none;border-radius:4px;
  padding:5px 10px;cursor:pointer;font-size:13px;white-space:nowrap;transition:background .1s}
button:hover:not(:disabled){background:var(--accent-h)}
button:active:not(:disabled){background:var(--accent-p)}
button.ghost{background:transparent;border:1px solid var(--border);color:var(--dim)}
button.ghost:hover:not(:disabled){border-color:var(--dim);background:var(--sep);color:var(--text)}
button.danger{background:var(--danger)}
button.danger:hover:not(:disabled){background:var(--danger-h)}
button.success{background:var(--success)}
button.success:hover:not(:disabled){background:var(--success-h)}
button:disabled{background:var(--sep)!important;color:var(--muted)!important;cursor:not-allowed}
.btn-row{display:flex;gap:5px;flex-wrap:wrap;align-items:center;margin-top:6px}

/* ── Layout ── */
#main{display:grid;grid-template-columns:400px 290px 1fr;gap:8px;
  padding:8px;flex:1;min-height:0;overflow:hidden}
.col{display:flex;flex-direction:column;gap:8px;overflow-y:auto;min-height:0}
#col-seq{display:flex;flex-direction:column;min-height:0;overflow:hidden}

/* ── Panels ── */
.panel{background:var(--panel);border:1px solid var(--border);border-radius:6px;
  padding:10px 12px;flex-shrink:0}
#panel-seq{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden}
.ph{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.6px;
  padding-bottom:5px;margin-bottom:8px;border-bottom:1px solid var(--sep);
  display:flex;justify-content:space-between;align-items:center}

/* ── Position ── */
.pos-row{display:flex;gap:4px}
.pv{flex:1;text-align:center;background:var(--dark);border-radius:4px;padding:4px 2px}
.pl{display:block;font-size:10px;color:var(--dim);margin-bottom:1px}
.pv span:last-child{font-size:15px;font-weight:500;font-variant-numeric:tabular-nums}

/* ── Forms ── */
.form-row{display:grid;grid-template-columns:18px 1fr 18px 1fr;
  align-items:center;gap:4px 6px;margin-bottom:5px}
.form-row label{color:var(--dim);font-size:12px;text-align:right}
input[type=number],input[type=text]{background:var(--dark);color:var(--text);
  border:1px solid var(--border);border-radius:4px;padding:4px 7px;
  font-size:13px;width:100%;outline:none}
input[type=number]:focus,input[type=text]:focus{border-color:var(--accent)}

/* ── Step size ── */
.step-row{display:flex;align-items:center;gap:5px;margin-bottom:7px}
.step-btn{background:transparent;border:1px solid var(--border);color:var(--dim);
  padding:3px 9px;font-size:12px;border-radius:4px}
.step-btn.active{background:var(--accent);border-color:var(--accent);color:var(--text)}
.step-btn:hover:not(.active):not(:disabled){border-color:var(--dim);background:var(--sep)}

/* ── Jog grid ── */
.jog-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px}

/* ── Sliders ── */
.sg{margin-bottom:9px}
.sg .lbl{display:block;font-size:11px;color:var(--dim);margin-bottom:4px}
.srow{display:flex;align-items:center;gap:8px}
input[type=range]{flex:1;-webkit-appearance:none;height:6px;background:var(--sep);
  border-radius:3px;outline:none;cursor:pointer}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:18px;height:18px;
  border-radius:50%;background:var(--accent-h);cursor:pointer;border:1px solid var(--border)}
.sv{font-size:12px;min-width:30px;text-align:right;font-variant-numeric:tabular-nums}

/* ── Sequence ── */
.add-btns{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:7px}
.add-btns button{font-size:11px;padding:3px 7px}
#seq-list{flex:1;overflow-y:auto;min-height:0;border:1px solid var(--sep);
  border-radius:4px;margin-bottom:5px}
.seq-row{display:flex;align-items:center;gap:7px;padding:4px 8px;
  cursor:pointer;min-height:27px;border-bottom:1px solid var(--sep)}
.seq-row:last-child{border-bottom:none}
.seq-row:hover{background:rgba(255,255,255,.04)}
.seq-row.selected{background:rgba(65,125,195,.18)}
.seq-row.current{background:rgba(48,172,95,.18)}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.snum{color:var(--muted);font-size:11px;min-width:20px;font-variant-numeric:tabular-nums}
.slbl{flex:1;font-size:12px}
.seq-empty{color:var(--muted);font-size:12px;text-align:center;padding:18px}
#panel-seq .btn-row{margin-bottom:5px}
#inp-name{flex:1;min-width:70px}

/* ── Log ── */
#log-panel{flex-shrink:0;height:170px;background:var(--panel);
  border-top:1px solid var(--border);padding:5px 12px 6px;
  display:flex;flex-direction:column;overflow:hidden}
#log-entries{overflow-y:auto;flex:1;font-size:11px;
  font-family:'Consolas','Courier New',monospace}
.le{display:flex;gap:8px;padding:1px 0}
.lts{color:var(--muted);flex-shrink:0}
.lmsg{color:var(--dim)}
.le.ERROR .lmsg{color:#d74b4b}
.le.WARNING .lmsg{color:var(--warn)}

/* ── Modals ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);
  display:flex;align-items:center;justify-content:center;z-index:100}
.modal.hidden{display:none}
.mbox{background:var(--panel);border:1px solid var(--border);border-radius:8px;
  padding:18px;min-width:300px;max-width:460px;width:90%}
.mtitle{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--text)}
.frow{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.frow label{color:var(--dim);min-width:170px;font-size:12px}
.frow input{flex:1}
#load-list{max-height:240px;overflow-y:auto}
.li{padding:8px 10px;cursor:pointer;border-radius:4px;color:var(--text);font-size:13px}
.li:hover{background:var(--sep)}
</style>
</head>
<body>

<!-- ── Header ── -->
<header>
  <span class="title">DOBOT CONTROLLER</span>
  <span class="dot" id="dot"></span>
  <span id="status-text">DISCONNECTED</span>
  <select id="port-select"><option value="">No ports</option></select>
  <button id="btn-refresh" class="ghost">Refresh</button>
  <button id="btn-connect">Connect</button>
  <button id="btn-home" class="ghost">Home</button>
</header>

<!-- ── Main ── -->
<div id="main">

  <!-- Left column -->
  <div class="col">
    <div class="panel">
      <div class="ph">Current Position</div>
      <div class="pos-row">
        <div class="pv"><span class="pl">X</span><span id="px">0.00</span></div>
        <div class="pv"><span class="pl">Y</span><span id="py">0.00</span></div>
        <div class="pv"><span class="pl">Z</span><span id="pz">0.00</span></div>
        <div class="pv"><span class="pl">R</span><span id="pr">0.00</span></div>
      </div>
    </div>

    <div class="panel">
      <div class="ph">Move To</div>
      <div class="form-row">
        <label>X</label><input type="number" id="ix" value="200" step="0.1">
        <label>Y</label><input type="number" id="iy" value="0"   step="0.1">
      </div>
      <div class="form-row">
        <label>Z</label><input type="number" id="iz" value="50"  step="0.1">
        <label>R</label><input type="number" id="ir" value="0"   step="0.1">
      </div>
      <div class="btn-row" style="margin-top:8px">
        <button id="btn-curr" class="ghost">Use Current</button>
        <button id="btn-move">Move To</button>
      </div>
    </div>

    <div class="panel">
      <div class="ph">Quick Jog</div>
      <div class="step-row">
        <span style="color:var(--dim);font-size:11px">Step&nbsp;(mm):</span>
        <button class="step-btn" data-step="5">5</button>
        <button class="step-btn" data-step="10">10</button>
        <button class="step-btn active" data-step="20">20</button>
        <button class="step-btn" data-step="50">50</button>
      </div>
      <div class="jog-grid">
        <button data-axis="x" data-sign="-1">X &minus;</button>
        <button data-axis="x" data-sign="1">X +</button>
        <button data-axis="y" data-sign="-1">Y &minus;</button>
        <button data-axis="y" data-sign="1">Y +</button>
        <button data-axis="z" data-sign="-1">Z &minus;</button>
        <button data-axis="z" data-sign="1">Z +</button>
      </div>
    </div>
  </div>

  <!-- Center column -->
  <div class="col">
    <div class="panel">
      <div class="ph">XY Jog &nbsp;<span style="font-size:10px;font-style:italic">(arrow keys)</span></div>
      <div style="display:flex;justify-content:center">
        <canvas id="joy" width="214" height="214"></canvas>
      </div>
    </div>

    <div class="panel">
      <div class="ph">Z Jog &amp; Speed</div>
      <div class="sg">
        <span class="lbl">Z Jog &nbsp;(PgUp / PgDn)</span>
        <div class="srow">
          <input type="range" id="z-sl" min="-100" max="100" value="0">
          <span class="sv" id="z-sv">0</span>
        </div>
      </div>
      <div class="sg">
        <span class="lbl">Speed (mm/s)</span>
        <div class="srow">
          <input type="range" id="sp-sl" min="5" max="200" value="50">
          <span class="sv" id="sp-sv">50</span>
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-vac">Vacuum OFF</button>
        <button id="btn-alm" class="danger">Clear Alarms</button>
      </div>
    </div>

    <div class="panel">
      <div class="ph">Conveyor Belt</div>
      <div class="sg">
        <span class="lbl">Speed (%)</span>
        <div class="srow">
          <input type="range" id="cv-sl" min="0" max="100" value="50">
          <span class="sv" id="cv-sv">50</span>
        </div>
      </div>
      <div class="btn-row">
        <button id="btn-cdir" class="ghost">Forward</button>
        <button id="btn-crun" class="success">Start</button>
        <button id="btn-ciface" class="ghost">Iface: 0</button>
      </div>
    </div>
  </div>

  <!-- Sequence column -->
  <div id="col-seq">
    <div class="panel" id="panel-seq">
      <div class="ph">
        <span>Sequence Editor</span>
        <span id="seq-cnt" style="color:var(--muted);font-size:11px"></span>
      </div>
      <div class="add-btns">
        <button class="ghost add" data-type="move_to">+ Position</button>
        <button class="ghost add" data-type="move_rel">+ Relative</button>
        <button class="ghost add" data-type="suction">+ Suction</button>
        <button class="ghost add" data-type="gripper">+ Gripper</button>
        <button class="ghost add" data-type="wait">+ Wait</button>
        <button class="ghost add" data-type="home">+ Home</button>
        <button class="ghost add" data-type="speed">+ Speed</button>
        <button class="ghost add" data-type="set_io">+ IO</button>
        <button class="ghost add" data-type="conveyor_belt">+ Conveyor</button>
        <button class="ghost add" data-type="conveyor_belt_distance">+ Conv Dist</button>
      </div>
      <div id="seq-list"></div>
      <div class="btn-row">
        <button id="btn-del" class="danger">Delete</button>
        <button id="btn-up"  class="ghost">Up</button>
        <button id="btn-dn"  class="ghost">Down</button>
        <button id="btn-dup" class="ghost">Duplicate</button>
      </div>
      <div class="btn-row">
        <button id="btn-play" class="success">Play</button>
        <button id="btn-stop" class="danger">Stop</button>
        <button id="btn-loop" class="ghost">Loop: OFF</button>
      </div>
      <div class="btn-row">
        <button id="btn-save" class="ghost">Save</button>
        <button id="btn-load" class="ghost">Load</button>
        <button id="btn-clr"  class="danger">Clear</button>
        <input type="text" id="inp-name" value="untitled">
      </div>
    </div>
  </div>
</div>

<!-- ── Log ── -->
<div id="log-panel">
  <div class="ph" style="margin-bottom:4px">Log</div>
  <div id="log-entries"></div>
</div>

<!-- ── Edit modal ── -->
<div id="edit-modal" class="modal hidden">
  <div class="mbox">
    <div class="mtitle" id="m-title">Edit Step</div>
    <div id="m-fields"></div>
    <div class="btn-row" style="margin-top:12px">
      <button id="m-apply">Apply</button>
      <button id="m-cancel" class="ghost">Cancel</button>
    </div>
  </div>
</div>

<!-- ── Load picker ── -->
<div id="load-modal" class="modal hidden">
  <div class="mbox">
    <div class="mtitle">Load Sequence</div>
    <div id="load-list"></div>
    <div class="btn-row" style="margin-top:10px">
      <button id="lm-cancel" class="ghost">Cancel</button>
    </div>
  </div>
</div>

<script>
// ── State ─────────────────────────────────────────────────────────────────────
const S = {
  connected:false, connecting:false,
  ports:[], portIndex:0,
  pos:{X:0,Y:0,Z:0,R:0},
  vacuum:false,
  convRunning:false, convDir:1, convIface:0,
  playing:false, paused:false, looping:false, current:-1,
  steps:[], selected:-1, jogStep:20,
};

// ── API ───────────────────────────────────────────────────────────────────────
async function post(url, data){
  const r = await fetch(url,{method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data??{})});
  if(r.status===204) return null;
  return r.json();
}
async function del(url){return (await fetch(url,{method:'DELETE'})).json()}
async function put(url,data){
  return (await fetch(url,{method:'PUT',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify(data)})).json();
}

// ── SSE ───────────────────────────────────────────────────────────────────────
function startSse(){
  const es = new EventSource('/events');
  es.onmessage = e => handle(JSON.parse(e.data));
  es.onerror = () => setStatus(false,false);
}

function handle(d){
  switch(d.type){
    case 'state':    applyState(d);   break;
    case 'pos':      applyPos(d);     break;
    case 'log':      addLog(d);       break;
    case 'steps':    renderSteps(d.steps); break;
    case 'seq_state':applySeqState(d);break;
    case 'vacuum':   setVacuum(d.on); break;
    case 'conveyor': applyConveyor(d);break;
    case 'ports':    setPorts(d.ports,d.index); break;
  }
}

function applyState(d){
  S.connected=d.connected; S.connecting=d.connecting;
  S.convRunning=d.conv_running; S.convDir=d.conv_direction; S.convIface=d.conv_interface;
  S.playing=d.seq_playing; S.paused=d.seq_paused;
  S.looping=d.seq_looping; S.current=d.seq_current;
  S.steps=d.steps??[];
  setPorts(d.ports,d.port_index);
  applyPos(d.pos);
  setStatus(d.connected,d.connecting);
  setVacuum(d.vacuum);
  updateConvBtns();
  renderSteps(S.steps);
  applySeqState(d);
  if(d.logs) d.logs.forEach(addLog);
}

function applyPos(p){
  if(!p) return;
  if(p.X!==undefined) S.pos={X:p.X,Y:p.Y,Z:p.Z,R:p.R};
  $('px').textContent=S.pos.X.toFixed(2);
  $('py').textContent=S.pos.Y.toFixed(2);
  $('pz').textContent=S.pos.Z.toFixed(2);
  $('pr').textContent=S.pos.R.toFixed(2);
}

function setStatus(conn,conn2){
  const dot=$('dot'), txt=$('status-text'), btn=$('btn-connect');
  if(conn2){
    dot.className='dot warn'; txt.textContent='CONNECTING…';
    btn.textContent='Connecting…'; btn.disabled=true;
  } else if(conn){
    dot.className='dot ok'; txt.textContent='CONNECTED';
    btn.textContent='Disconnect'; btn.className='danger'; btn.disabled=false;
  } else {
    dot.className='dot'; txt.textContent='DISCONNECTED';
    btn.textContent='Connect'; btn.className=''; btn.disabled=false;
  }
}

function setPorts(ports,idx){
  S.ports=ports??[]; S.portIndex=idx??0;
  const sel=$('port-select');
  sel.innerHTML=S.ports.length
    ? S.ports.map((p,i)=>`<option value="${i}"${i===S.portIndex?' selected':''}>${p}</option>`).join('')
    : '<option value="">No ports</option>';
}

function setVacuum(on){
  S.vacuum=on;
  const b=$('btn-vac');
  b.textContent=on?'Vacuum ON':'Vacuum OFF';
  b.className=on?'success':'';
}

function applyConveyor(d){
  S.convRunning=d.running; S.convDir=d.direction; S.convIface=d.interface;
  updateConvBtns();
}
function updateConvBtns(){
  const r=$('btn-crun'),dir=$('btn-cdir'),iface=$('btn-ciface');
  r.textContent=S.convRunning?'Stop':'Start';
  r.className=S.convRunning?'danger':'success';
  dir.textContent=S.convDir>0?'Forward':'Reverse';
  iface.textContent=`Iface: ${S.convIface}`;
}

function applySeqState(d){
  S.playing = d.seq_playing ?? d.playing ?? S.playing;
  S.paused  = d.seq_paused  ?? d.paused  ?? S.paused;
  S.looping = d.seq_looping ?? d.looping ?? S.looping;
  S.current = d.seq_current ?? d.current ?? S.current;
  const p=$('btn-play');
  if(S.playing && !S.paused){ p.textContent='Pause'; p.className=''; }
  else if(S.playing && S.paused){ p.textContent='Resume'; p.className='success'; }
  else { p.textContent='Play'; p.className='success'; }
  const l=$('btn-loop');
  l.textContent=`Loop: ${S.looping?'ON':'OFF'}`;
  l.className=S.looping?'success':'ghost';
  renderSteps(null);  // refresh highlights
}

// ── Log ───────────────────────────────────────────────────────────────────────
function addLog(e){
  const el=$('log-entries');
  const row=document.createElement('div');
  row.className=`le ${e.level}`;
  row.innerHTML=`<span class="lts">${e.ts}</span><span class="lmsg">${esc(e.msg)}</span>`;
  el.appendChild(row);
  while(el.children.length>300) el.removeChild(el.firstChild);
  el.scrollTop=el.scrollHeight;
}
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

// ── Step list ─────────────────────────────────────────────────────────────────
const COLORS={
  move_to:'#417dc3',move_rel:'#5591d7',
  suction:'#30ac5f',gripper:'#41c070',
  wait:'#cd9e34',home:'#8c8c9e',
  speed:'#5587be',set_io:'#d74b4b',
  conveyor_belt:'#cd8034',conveyor_belt_distance:'#d76428',
};
function slabel(s){
  const t=s.type,p=s.params;
  if(t==='move_to')  return `Move To (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}, ${p.r.toFixed(1)})`;
  if(t==='move_rel') return `Move Rel (${p.x.toFixed(1)}, ${p.y.toFixed(1)}, ${p.z.toFixed(1)}, ${p.r.toFixed(1)})`;
  if(t==='suction')  return `Suction ${p.on?'ON':'OFF'}`;
  if(t==='gripper')  return `Gripper ${p.on?'ON':'OFF'}`;
  if(t==='wait')     return `Wait ${p.seconds.toFixed(1)}s`;
  if(t==='home')     return 'Home';
  if(t==='speed')    return `Speed ${p.velocity.toFixed(0)} mm/s`;
  if(t==='set_io')   return `IO #${p.address} ${p.state?'ON':'OFF'}`;
  if(t==='conveyor_belt'){
    const d=p.direction>0?'FWD':'REV';
    const dur=p.duration>0?` ${p.duration.toFixed(1)}s`:' cont.';
    return `Belt ${Math.round(p.speed*100)}% ${d}${dur}`;
  }
  if(t==='conveyor_belt_distance'){
    const d=p.direction>0?'FWD':'REV';
    return `Belt ${p.distance.toFixed(0)}mm@${p.speed.toFixed(0)}mm/s ${d}`;
  }
  return t;
}

function renderSteps(steps){
  if(steps!=null) S.steps=steps;
  $('seq-cnt').textContent=`${S.steps.length} steps`;
  const list=$('seq-list');
  if(!S.steps.length){
    list.innerHTML='<div class="seq-empty">Use + buttons above to add steps</div>';
    return;
  }
  list.innerHTML=S.steps.map((s,i)=>{
    const col=COLORS[s.type]||'#888';
    const cls=i===S.current?'current':i===S.selected?'selected':'';
    return `<div class="seq-row ${cls}" data-i="${i}">
      <span class="snum">${String(i+1).padStart(2,'0')}</span>
      <span class="sdot" style="background:${col}"></span>
      <span class="slbl">${esc(slabel(s))}</span>
    </div>`;
  }).join('');
  list.querySelectorAll('.seq-row').forEach(row=>{
    const idx=parseInt(row.dataset.i);
    row.addEventListener('click',()=>{
      if(idx===S.selected) openEdit(idx);
      else{ S.selected=idx; renderSteps(null); }
    });
    row.addEventListener('dblclick',()=>openEdit(idx));
  });
}

// ── Step defaults ─────────────────────────────────────────────────────────────
function defStep(type){
  const pos=S.pos;
  const map={
    move_to:  {x:pos.X,y:pos.Y,z:pos.Z,r:pos.R},
    move_rel: {x:0,y:0,z:0,r:0},
    suction:  {on:true},
    gripper:  {on:true},
    wait:     {seconds:1.0},
    home:     {},
    speed:    {velocity:100,acceleration:100},
    set_io:   {address:1,state:true},
    conveyor_belt:          {speed:0.5,direction:S.convDir,interface:S.convIface,duration:2.0},
    conveyor_belt_distance: {speed:50,distance:100,direction:S.convDir,interface:S.convIface},
  };
  const params=map[type]??{};
  if(type==='suction'||type==='gripper'){
    for(let i=S.steps.length-1;i>=0;i--){
      if(S.steps[i].type===type){params.on=!S.steps[i].params.on;break}
    }
  }
  return {type,params};
}

async function addStep(type){
  const step=defStep(type);
  const idx=S.selected>=0?S.selected+1:S.steps.length;
  await post('/api/sequence/insert',{idx,step});
  S.selected=idx;
}

// ── Edit modal ────────────────────────────────────────────────────────────────
const FIELDS={
  move_to:  [{k:'x',l:'X'},{k:'y',l:'Y'},{k:'z',l:'Z'},{k:'r',l:'R'}],
  move_rel: [{k:'x',l:'X'},{k:'y',l:'Y'},{k:'z',l:'Z'},{k:'r',l:'R'}],
  suction:  [{k:'on',l:'ON (1 = on, 0 = off)'}],
  gripper:  [{k:'on',l:'ON (1 = on, 0 = off)'}],
  wait:     [{k:'seconds',l:'Seconds'}],
  home:     [],
  speed:    [{k:'velocity',l:'Velocity (mm/s)'},{k:'acceleration',l:'Acceleration (mm/s²)'}],
  set_io:   [{k:'address',l:'Pin (1–22)'},{k:'state',l:'State (1 = on, 0 = off)'}],
  conveyor_belt:[
    {k:'speed',l:'Speed (0.0 – 1.0)'},
    {k:'direction',l:'Direction (1 = fwd, −1 = rev)'},
    {k:'interface',l:'Interface (0 or 1)'},
    {k:'duration',l:'Duration sec (0 = continuous)'},
  ],
  conveyor_belt_distance:[
    {k:'speed',l:'Speed (mm/s, 0 – 100)'},
    {k:'distance',l:'Distance (mm)'},
    {k:'direction',l:'Direction (1 = fwd, −1 = rev)'},
    {k:'interface',l:'Interface (0 or 1)'},
  ],
};
let editIdx=-1;

function openEdit(idx){
  if(S.playing) return;
  editIdx=idx;
  const s=S.steps[idx];
  $('m-title').textContent=`Edit: ${s.type}`;
  const flds=FIELDS[s.type]??[];
  if(!flds.length){
    $('m-fields').innerHTML='<p style="color:var(--dim);font-size:12px;padding:4px 0">No editable parameters.</p>';
  } else {
    $('m-fields').innerHTML=flds.map(f=>{
      const v=s.params[f.k];
      const dv=typeof v==='boolean'?(v?1:0):v;
      return `<div class="frow"><label>${f.l}</label>
        <input type="number" step="any" data-k="${f.k}" value="${dv}"></div>`;
    }).join('');
  }
  $('edit-modal').classList.remove('hidden');
  const first=$('m-fields').querySelector('input');
  if(first) setTimeout(()=>first.focus(),50);
}

async function applyEdit(){
  if(editIdx<0||editIdx>=S.steps.length){closeEdit();return}
  const step=JSON.parse(JSON.stringify(S.steps[editIdx]));
  document.querySelectorAll('#m-fields input').forEach(inp=>{
    const k=inp.dataset.k, cur=step.params[k];
    const v=inp.value;
    if(typeof cur==='boolean') step.params[k]=v!=='0'&&v.toLowerCase()!=='false';
    else if(typeof cur==='number'&&Number.isInteger(cur)) step.params[k]=Math.round(parseFloat(v));
    else step.params[k]=parseFloat(v);
  });
  await put(`/api/sequence/${editIdx}`,step);
  closeEdit();
}
function closeEdit(){editIdx=-1;$('edit-modal').classList.add('hidden')}

// ── Load picker ───────────────────────────────────────────────────────────────
async function openLoad(){
  const {files}=await(await fetch('/api/sequence/files')).json();
  const list=$('load-list');
  if(!files.length){
    list.innerHTML='<div style="color:var(--muted);padding:12px;font-size:12px">No saved sequences</div>';
  } else {
    list.innerHTML=files.map(f=>`<div class="li" data-f="${f}">${f.replace('.json','')}</div>`).join('');
    list.querySelectorAll('.li').forEach(el=>{
      el.addEventListener('click',async()=>{
        const r=await post('/api/sequence/load',{filename:el.dataset.f});
        if(r.name) $('inp-name').value=r.name;
        $('load-modal').classList.add('hidden');
      });
    });
  }
  $('load-modal').classList.remove('hidden');
}

// ── Joystick ──────────────────────────────────────────────────────────────────
const joy=(()=>{
  let cv,ctx,cx,cy,R;
  let vx=0,vy=0,active=false;
  let kx=0,ky=0;   // keyboard-driven velocity

  function init(){
    cv=document.getElementById('joy');
    ctx=cv.getContext('2d');
    cx=cv.width/2; cy=cv.height/2;
    R=Math.min(cx,cy)-8;

    const xy=e=>{
      const r=cv.getBoundingClientRect();
      const src=e.touches?e.touches[0]:e;
      return [src.clientX-r.left, src.clientY-r.top];
    };
    const tryStart=([mx,my])=>{if(Math.hypot(mx-cx,my-cy)<=R) active=true};
    const onMove=([mx,my])=>{
      if(!active) return;
      let dx=mx-cx,dy=my-cy,d=Math.hypot(dx,dy),m=R-16;
      if(d>m){const s=m/d;dx*=s;dy*=s}
      vx=dx/m; vy=dy/m;
    };
    const onEnd=()=>{active=false;vx=0;vy=0};

    cv.addEventListener('mousedown',e=>tryStart(xy(e)));
    cv.addEventListener('mousemove',e=>onMove(xy(e)));
    cv.addEventListener('mouseup',onEnd);
    cv.addEventListener('mouseleave',onEnd);
    cv.addEventListener('touchstart',e=>{e.preventDefault();tryStart(xy(e))},{passive:false});
    cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(xy(e))},{passive:false});
    cv.addEventListener('touchend',onEnd);
  }

  function draw(){
    ctx.clearRect(0,0,cv.width,cv.height);
    // Base
    ctx.fillStyle='#1a1a24';
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#343446';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();
    // Guide rings
    for(const rr of[R*.5,R*.85]){
      ctx.strokeStyle='#2e2e42';
      ctx.beginPath();ctx.arc(cx,cy,rr,0,Math.PI*2);ctx.stroke();
    }
    // Crosshair
    ctx.strokeStyle='#2e2e42';
    ctx.beginPath();ctx.moveTo(cx,cy-R+8);ctx.lineTo(cx,cy+R-8);ctx.stroke();
    ctx.beginPath();ctx.moveTo(cx-R+8,cy);ctx.lineTo(cx+R-8,cy);ctx.stroke();
    // Axis labels
    ctx.fillStyle='#525264';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('X+',cx+R+14,cy+4);ctx.fillText('X−',cx-R-14,cy+4);
    ctx.fillText('Y+',cx,cy-R-6);ctx.fillText('Y−',cx,cy+R+14);
    // Thumb
    const ex=active?vx:kx, ey=active?vy:ky;
    const sx=cx+ex*(R-16), sy=cy+ey*(R-16);
    const moving=active||kx!==0||ky!==0;
    ctx.fillStyle=moving?'#6ca0d7':'#5587be';
    ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#a0a0b4';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(sx,sy,14,0,Math.PI*2);ctx.stroke();
  }

  return{
    init,draw,
    getVx:()=>active?vx:kx,
    getVy:()=>active?vy:ky,
    setKb:(x,y)=>{kx=x;ky=y},
  };
})();

// ── Jog RAF loop ──────────────────────────────────────────────────────────────
let jogBusy=false, lastJogTs=0;
const JOG_MS=33;  // 30 fps max

function raf(ts){
  joy.draw();
  if(!jogBusy && S.connected && ts-lastJogTs>=JOG_MS){
    const vx=joy.getVx(), vy=joy.getVy();
    const vz=parseFloat($('z-sl').value)/100;
    const speed=parseFloat($('sp-sl').value);
    jogBusy=true; lastJogTs=ts;
    fetch('/api/jog',{method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({vx,vy,vz,speed})
    }).then(()=>{jogBusy=false}).catch(()=>{jogBusy=false});
  }
  requestAnimationFrame(raf);
}

// ── Keyboard ──────────────────────────────────────────────────────────────────
const keys=new Set();
const KSTEP=0.06;
let kbVx=0,kbVy=0;
const noInput=()=>!['INPUT','TEXTAREA','SELECT'].includes(document.activeElement?.tagName);

document.addEventListener('keydown',e=>{
  if(noInput()&&['ArrowRight','ArrowLeft','ArrowUp','ArrowDown','PageUp','PageDown']
    .includes(e.code)) e.preventDefault();
  keys.add(e.code);
});
document.addEventListener('keyup',e=>{
  keys.delete(e.code);
  if(!keys.has('PageUp')&&!keys.has('PageDown')){
    if(e.code==='PageUp'||e.code==='PageDown'){
      $('z-sl').value=0; $('z-sv').textContent='0';
    }
  }
});

// Poll keyboard at 60fps for smooth ramping
setInterval(()=>{
  if(!noInput()){kbVx=0;kbVy=0;joy.setKb(0,0);return}
  kbVx = keys.has('ArrowRight') ? Math.min(1,kbVx+KSTEP)
       : keys.has('ArrowLeft')  ? Math.max(-1,kbVx-KSTEP)
       : 0;
  kbVy = keys.has('ArrowDown')  ? Math.min(1,kbVy+KSTEP)
       : keys.has('ArrowUp')    ? Math.max(-1,kbVy-KSTEP)
       : 0;
  joy.setKb(kbVx,kbVy);
  const zsl=$('z-sl');
  if(keys.has('PageUp'))  {zsl.value=Math.min(100,+zsl.value+4);$('z-sv').textContent=zsl.value}
  if(keys.has('PageDown')){zsl.value=Math.max(-100,+zsl.value-4);$('z-sv').textContent=zsl.value}
},16);

// ── Helpers ───────────────────────────────────────────────────────────────────
const $=id=>document.getElementById(id);

// ── Init ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded',()=>{
  joy.init();
  startSse();
  requestAnimationFrame(raf);

  // Header
  $('btn-refresh').onclick=()=>post('/api/refresh');
  $('btn-connect').onclick=()=>{
    if(S.connected) post('/api/disconnect');
    else{
      const idx=parseInt($('port-select').value)||0;
      post('/api/connect',{port:S.ports[idx]||null});
    }
  };
  $('btn-home').onclick=()=>post('/api/home');

  // Move To
  $('btn-curr').onclick=()=>{
    $('ix').value=S.pos.X.toFixed(2); $('iy').value=S.pos.Y.toFixed(2);
    $('iz').value=S.pos.Z.toFixed(2); $('ir').value=S.pos.R.toFixed(2);
  };
  $('btn-move').onclick=()=>post('/api/move_to',{
    x:parseFloat($('ix').value), y:parseFloat($('iy').value),
    z:parseFloat($('iz').value), r:parseFloat($('ir').value)
  });

  // Step size
  document.querySelectorAll('.step-btn').forEach(b=>{
    b.onclick=()=>{
      S.jogStep=parseFloat(b.dataset.step);
      document.querySelectorAll('.step-btn').forEach(x=>x.classList.toggle('active',x===b));
    };
  });

  // Jog buttons
  document.querySelectorAll('[data-axis]').forEach(b=>{
    b.onclick=()=>post('/api/jog_step',{axis:b.dataset.axis,sign:+b.dataset.sign,step:S.jogStep});
  });

  // Z slider
  $('z-sl').oninput=()=>$('z-sv').textContent=$('z-sl').value;
  $('z-sl').onmouseup=$('z-sl').ontouchend=()=>{$('z-sl').value=0;$('z-sv').textContent='0'};

  // Speed slider
  $('sp-sl').oninput=()=>$('sp-sv').textContent=$('sp-sl').value;

  // Vacuum & alarms
  $('btn-vac').onclick=()=>post('/api/vacuum');
  $('btn-alm').onclick=()=>post('/api/clear_alarms');

  // Conveyor
  $('cv-sl').oninput=()=>$('cv-sv').textContent=$('cv-sl').value;
  $('btn-cdir').onclick=()=>{
    S.convDir=-S.convDir;
    $('btn-cdir').textContent=S.convDir>0?'Forward':'Reverse';
    if(S.convRunning) sendConv();
  };
  $('btn-crun').onclick=()=>{
    if(S.convRunning) post('/api/conveyor',{speed:0,direction:S.convDir,interface:S.convIface});
    else sendConv();
  };
  $('btn-ciface').onclick=()=>{
    S.convIface=1-S.convIface;
    $('btn-ciface').textContent=`Iface: ${S.convIface}`;
  };
  function sendConv(){
    const speed=parseInt($('cv-sl').value)/100;
    post('/api/conveyor',{speed,direction:S.convDir,interface:S.convIface});
  }

  // Sequence add
  document.querySelectorAll('.add').forEach(b=>b.onclick=()=>addStep(b.dataset.type));

  // Sequence edit/reorder
  $('btn-del').onclick=()=>{
    if(S.selected<0) return;
    del(`/api/sequence/${S.selected}`);
    S.selected=Math.max(-1,S.selected-1);
  };
  $('btn-up').onclick=()=>{
    if(S.selected>0){post('/api/sequence/move',{idx:S.selected,delta:-1});S.selected--}
  };
  $('btn-dn').onclick=()=>{
    if(S.selected<S.steps.length-1){post('/api/sequence/move',{idx:S.selected,delta:1});S.selected++}
  };
  $('btn-dup').onclick=()=>{
    if(S.selected>=0){post(`/api/sequence/${S.selected}/dup`);S.selected++}
  };

  // Playback
  $('btn-play').onclick=()=>post(S.playing?'/api/sequence/pause':'/api/sequence/play');
  $('btn-stop').onclick=()=>post('/api/sequence/stop');
  $('btn-loop').onclick=async()=>{
    const r=await post('/api/sequence/loop');
    S.looping=r.looping;
    $('btn-loop').textContent=`Loop: ${S.looping?'ON':'OFF'}`;
    $('btn-loop').className=S.looping?'success':'ghost';
  };

  // Save / Load / Clear
  $('btn-save').onclick=()=>post('/api/sequence/save',{name:$('inp-name').value.trim()||'untitled'});
  $('btn-load').onclick=openLoad;
  $('btn-clr').onclick=()=>{post('/api/sequence/clear');S.selected=-1};

  // Edit modal
  $('m-apply').onclick=applyEdit;
  $('m-cancel').onclick=closeEdit;
  $('edit-modal').onclick=e=>{if(e.target===$('edit-modal'))closeEdit()};
  $('edit-modal').addEventListener('keydown',e=>{
    if(e.key==='Enter') applyEdit();
    if(e.key==='Escape') closeEdit();
  });

  // Load modal
  $('lm-cancel').onclick=()=>$('load-modal').classList.add('hidden');
  $('load-modal').onclick=e=>{if(e.target===$('load-modal'))$('load-modal').classList.add('hidden')};
});
</script>
